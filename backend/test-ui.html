<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SaaS Dashboard Giriş (V2 Güncellemesi)</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background: #0f172a; color: white; }
        .login-box { background: #1e293b; padding: 30px; border-radius: 10px; width: 300px; margin: auto; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #334155; }
        .btn-primary { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Giriş Yap</h2>
        <!-- Geliştirici burada ID'yi değiştirdi. Eskiden id="submit-button" idi -->
        <input type="email" placeholder="E-posta" id="email-input">
        <input type="password" placeholder="Şifre" id="pass-input">
        <!-- YENİ ID EKLENDİ, ESKİSİ SİLİNDİ -->
        <button id="auth-confirm-btn" class="btn-primary">Hesaba Giriş Yap</button>
    </div>

</body>
</html>
